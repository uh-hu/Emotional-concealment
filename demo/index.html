<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语义——韵律分析</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
        <div class="grid-overlay"></div>
    </div>
    
    <div class="app-container">
        <header class="app-header">
            <div class="badge">AI 分析引擎</div>
            <h1 class="main-title">语义——韵律分析</h1>
            <p class="subtitle">深度多模态情感计算与认知解析平台</p>
        </header>

        <main class="main-content glass-card" id="mainCard">
            <!-- Upload / Input Section -->
            <section class="panel active" id="inputPanel">
                <div class="upload-area" id="uploadArea">
                    <div class="mic-container">
                        <button class="mic-button" id="micBtn" aria-label="录音">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <div class="mic-waves">
                            <div class="wave"></div>
                            <div class="wave"></div>
                            <div class="wave"></div>
                        </div>
                    </div>
                    
                    <h3 class="upload-title">点击开始录制语音</h3>
                    <p class="upload-desc">或者将音频文件拖拽到此区域</p>
                    
                    <div class="divider"><span>OR</span></div>
                    
                    <input type="file" id="fileInput" accept="audio/*, video/*" hidden>
                    <label for="fileInput" class="btn btn-outline">
                        <i class="fas fa-folder-open"></i> 浏览本地文件
                    </label>
                </div>

                <div class="file-status hidden" id="fileStatus">
                    <div class="file-info">
                        <i class="fas fa-file-audio file-icon"></i>
                        <div class="file-details">
                            <span class="file-name" id="fileName">音频文件.wav</span>
                        </div>
                    </div>
                    <button class="btn btn-icon" id="removeFileBtn" title="删除"><i class="fas fa-times"></i></button>
                </div>

                <div class="action-footer">
                    <button class="btn btn-primary btn-large" id="submitBtn" disabled>
                        开始深度分析 <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </section>

            <!-- Loading Section -->
            <section class="panel hidden" id="loadingPanel" style="display: none;">
                <div class="loading-container">
                    <div class="spinner">
                        <svg viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </div>
                    <h3 class="loading-title">正在处理音频信号...</h3>
                    <p class="loading-desc" id="loadingText">提取声学特征 (Prosody Extraction)</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
            </section>

            <!-- Result Section -->
            <section class="panel hidden" id="resultPanel" style="display: none;">
                <div class="result-header">
                    <h2>分析总结报告</h2>
                    <span class="status-badge critical" id="resultStatusBadge"><i class="fas fa-exclamation-triangle"></i> 高风险发现</span>
                </div>
                
                <div class="insight-card">
                    <p class="insight-text" id="resultInsight">
                        系统检测到目标的 <strong>语义表达</strong> 与 <strong>韵律特征</strong> 之间存在 <span class="highlight">巨大偏移</span>。这通常表现在传递正面字面意义时，伴随了负向或紧张的声学韵律特征（如音调突变、持续颤动等）。<br>
                        <em>结论支持：极高概率存在隐瞒真实情感或认知失调的状况。</em>
                    </p>
                </div>

                <div class="viz-layout" id="vizLayout">
                    <div class="viz-card">
                        <div class="viz-title">
                            <span>跨模态对齐</span>
                            <span class="viz-subtitle">韵律向量 vs 语义向量</span>
                        </div>
                        <div class="angle-gauge">
                            <svg viewBox="0 0 260 140" class="angle-svg" aria-label="向量夹角示意">
                                <defs>
                                    <linearGradient id="vecGradA" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="var(--primary)"></stop>
                                        <stop offset="100%" stop-color="var(--accent)"></stop>
                                    </linearGradient>
                                    <linearGradient id="vecGradB" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="var(--danger)"></stop>
                                        <stop offset="100%" stop-color="#f59e0b"></stop>
                                    </linearGradient>
                                </defs>
                                <circle cx="80" cy="70" r="46" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"></circle>
                                <line x1="80" y1="70" x2="140" y2="70" stroke="url(#vecGradA)" stroke-width="6" stroke-linecap="round"></line>
                                <line id="vecLineB" x1="80" y1="70" x2="140" y2="70" stroke="url(#vecGradB)" stroke-width="6" stroke-linecap="round" transform="rotate(90 80 70)"></line>
                                <circle cx="80" cy="70" r="6" fill="rgba(255,255,255,0.7)"></circle>
                                <text x="165" y="58" class="angle-text" id="angleText">Angle: --</text>
                                <text x="165" y="82" class="angle-text-muted" id="cosText">cos: --</text>
                                <text x="165" y="106" class="angle-text-muted" id="consistencyText">consistency: --</text>
                            </svg>
                        </div>
                        <div class="metric-row" id="alignmentMetrics"></div>
                    </div>

                    <div class="viz-card">
                        <div class="viz-title">
                            <span>192 维差异热力图</span>
                            <span class="viz-subtitle">|p - s|</span>
                        </div>
                        <div class="heatmap-wrap">
                            <div class="heatmap" id="diffHeatmap" role="grid" aria-label="差异热力图"></div>
                            <div class="heatmap-inspector" id="heatmapInspector">将鼠标悬停在格子上查看数值</div>
                        </div>
                        <div class="topk" id="topkList"></div>
                    </div>
                </div>
                <div class="action-footer result-footer">
                    <button class="btn btn-outline" id="resetBtn">
                        <i class="fas fa-redo"></i> 重新分析其他样本
                    </button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
